<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="calculator-body">
        <div id="display">
            0
        </div>
        <div id="buttons">
            <div class="row">
                <button type="button" id="clear" class="top-row">AC</button>
                <button type="button" id="backspace" class="top-row">CE</button>
            </div>
            <div class="row">
                <button type="button" id="seven" class="basic digit">7</button>
                <button type="button" id="eight" class="basic digit">8</button>
                <button type="button" id="nine" class="basic digit">9</button>
                <button type="button" id="multiply" class="operator">×</button>
            </div>
            <div class="row">
                <button type="button" id="four" class="basic digit">4</button>
                <button type="button" id="five" class="basic digit">5</button>
                <button type="button" id="six" class="basic digit">6</button>
                <button type="button" id="divide" class="operator">÷</button>
            </div>
            <div class="row">
                <button type="button" id="one" class="basic digit">1</button>
                <button type="button" id="two" class="basic digit">2</button>
                <button type="button" id="three" class="basic digit">3</button>
                <button type="button" id="add" class="operator">+</button>
            </div>
            <div class="row">
                <button type="button" id="zero" class="basic digit">0</button>
                <button type="button" id="decimal" class="basic">.</button>
                <button type="button" id="equals" class="basic">=</button>
                <button type="button" id="subtract" class="operator">-</button>
            </div>
        </div>
    </div>
    <script src="scripts.js"></script>
</body>
</html>
